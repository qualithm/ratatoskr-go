name: CI

on:
  push:
    branches: [main, test]
    paths-ignore:
      - ".githooks/**"
      - ".vscode/**"
      - "**/*.md"
      - "docker/**"
      - "LICENSE"
  pull_request:
    branches: [main, test]
    paths-ignore:
      - ".githooks/**"
      - ".vscode/**"
      - "**/*.md"
      - "docker/**"
      - "LICENSE"
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Format check
        run: |
          out=$(gofmt -s -l .)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: Tidy check
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum 2>/dev/null; then
            echo "go.mod / go.sum are not tidy. Run 'go mod tidy'."
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.1
          install-mode: goinstall

  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-24.04
    needs: build
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26"]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: Test
        run: go test -race -count=1 -shuffle=on ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests with coverage
        run:
          go test -race -count=1 -shuffle=on -coverprofile=coverage.out -covermode=atomic
          -coverpkg=./... ./...
      - name: Enforce coverage threshold
        run: |
          # Drop the examples package: it's a runnable sample, not library code.
          grep -v "/examples/" coverage.out > coverage.filtered.out
          pct=$(go tool cover -func=coverage.filtered.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "Total coverage (excluding examples): ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 80.0) { print "coverage below 80%"; exit 1 } }'
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false
      - name: Upload coverage artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 14

  vuln:
    name: Vulnerability Scan
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: Security Scan (gosec)
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run gosec
        uses: securego/gosec@6351b0c6fcc7d75acb230a9be7f9047aada322ae # master
        with:
          args: -exclude-dir=examples ./...

  benchmarks:
    name: Benchmark Check
    runs-on: ubuntu-24.04
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run benchmarks
        run: go test -run=^$ -bench=. -benchmem ./... | tee benchmark.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: benchmark-results
          path: benchmark.txt
          retention-days: 30
