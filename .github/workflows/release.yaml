name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.26"
  IMAGE: ghcr.io/${{ github.repository }}
  # TODO: Update this to your binary name
  BINARY_NAME: ratatoskr

jobs:
  build-binaries:
    name: Build Binary (${{ matrix.artifact }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: linux-amd64
          - goos: linux
            goarch: arm64
            artifact: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o dist/${{ env.BINARY_NAME }} \
            ./cmd/${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.artifact }}
          path: dist/${{ env.BINARY_NAME }}
          retention-days: 1

  docker:
    name: Build Docker Image
    runs-on: ubuntu-24.04
    needs: build-binaries
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-linux-amd64
          path: binaries/linux/amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-linux-arm64
          path: binaries/linux/arm64

      - name: Make binaries executable
        run: chmod +x binaries/linux/*/${{ env.BINARY_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ env.BINARY_NAME }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BINARY_NAME=${{ env.BINARY_NAME }}

      - name: Test image health
        run: |
          # Distroless has no shell; invoke the binary directly.
          docker run --rm ${{ env.IMAGE }}:sha-${GITHUB_SHA::7} promql expr 'up{job="ci"}'

  goreleaser:
    name: GoReleaser
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
