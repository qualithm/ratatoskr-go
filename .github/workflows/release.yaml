# Generated by dx/scripts/release-sync from ci-templates/release-go.yaml.
# Do not edit directly — change the template and re-run release-sync.

name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.26"
  IMAGE: ghcr.io/${{ github.repository }}
  BINARY_NAME: ratatoskr
  YQ_VERSION: "v4.44.3"

jobs:
  build-binaries:
    name: Build Binary (${{ matrix.artifact }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: linux-amd64
          - goos: linux
            goarch: arm64
            artifact: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o dist/${{ env.BINARY_NAME }} \
            ./cmd/${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.artifact }}
          path: dist/${{ env.BINARY_NAME }}
          retention-days: 1

  docker:
    name: Build Docker Image
    runs-on: ubuntu-24.04
    needs: build-binaries
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.BINARY_NAME }}-linux-amd64
          path: binaries/linux/amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.BINARY_NAME }}-linux-arm64
          path: binaries/linux/arm64

      - name: Make binaries executable
        run: chmod +x binaries/linux/*/${{ env.BINARY_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ env.BINARY_NAME }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BINARY_NAME=${{ env.BINARY_NAME }}

      - name: Test image health
        run: |
          # Distroless has no shell; invoke the binary directly.
          docker run --rm ${{ env.IMAGE }}:sha-${GITHUB_SHA::7} --help

  goreleaser:
    name: GoReleaser
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          # PREV_TAG is the most recent tag reachable before this one, if any.
          PREV_TAG=$(git tag --sort=-creatordate --merged "$TAG" | grep -Fxv "$TAG" | head -1 || true)

          # Injected from dx scripts/changelog-notes by release-sync — do not
          # hand-edit; change the source script and re-run release-sync.
          # GoReleaser's own `changelog.use: github` has the same blind spot as
          # `gh release create --generate-notes`: it only ever sees the single
          # squash-commit each development -> test -> main hop produces, never
          # the real commits squashed away inside it. This recursively unpacks
          # them back to their real leaf commits and overwrites what GoReleaser
          # just wrote.
          cat > /tmp/changelog-notes.py <<'PYEOF'
          # changelog-notes — build real release notes for a tag by recursively unpacking
          # squashed promotion-hop commits back to their leaf feat/fix/etc. commits.
          #
          # Neither `gh release create --generate-notes` nor GoReleaser's `changelog.use:
          # github` can do this: both only ever see one squash-commit per development ->
          # test -> main promotion hop, never the real commits that were squashed away.
          # This script walks the commit range for a tag, and for each commit whose title
          # matches the promotion-hop shape, looks up that PR's pre-squash commit list via
          # the GitHub API and recurses into it, until it reaches real leaf commits.
          #
          # Usage:
          #   changelog-notes --repo owner/name --tag TAG [--prev-tag PREV] [--repo-dir DIR]
          #
          # Requires: gh (authenticated), git (run inside, or --repo-dir pointing at, a
          # checkout with full history/tags — i.e. actions/checkout with fetch-depth: 0).
          #
          # Prints the release body (## What's Changed / ## Full Changelog) to stdout.
          import argparse
          import json
          import re
          import subprocess
          import sys

          PROMOTION_TITLE = re.compile(r"^(Promote .* → .* \(\d+ commits?\)|Merge .* into (main|test|development))")
          LEAF_EXCLUDE = [
              re.compile(r"^docs:"),
              re.compile(r"^test:"),
              re.compile(r"^chore:"),
              re.compile(r"^ci:"),
              re.compile(r"Merge pull request"),
              re.compile(r"Merge branch"),
          ]


          def gh_api_json(path, method="GET", fields=None):
              cmd = ["gh", "api", path]
              if method != "GET":
                  cmd += ["-X", method]
              for k, v in (fields or {}).items():
                  cmd += ["-f", f"{k}={v}"]
              out = subprocess.run(cmd, capture_output=True, text=True)
              if out.returncode != 0:
                  return None, out.stderr
              return json.loads(out.stdout), None


          class Resolver:
              def __init__(self, repo, repo_dir):
                  self.repo = repo
                  self.repo_dir = repo_dir
                  self.cache = {}

              def pr_for_commit(self, sha):
                  key = f"commit_pr:{sha}"
                  if key in self.cache:
                      return self.cache[key]
                  prs, _ = gh_api_json(f"repos/{self.repo}/commits/{sha}/pulls")
                  result = None
                  if prs:
                      merged = [p for p in prs if p.get("merged_at")]
                      if merged:
                          p = merged[0]
                          result = {
                              "number": p["number"],
                              "title": p["title"],
                              "author": (p.get("user") or {}).get("login"),
                              "url": p.get("html_url"),
                          }
                  self.cache[key] = result
                  return result

              def pr_commits(self, number):
                  key = f"pr_commits:{number}"
                  if key in self.cache:
                      return self.cache[key]
                  commits, _ = gh_api_json(f"repos/{self.repo}/pulls/{number}/commits")
                  result = [c["sha"] for c in (commits or [])]
                  self.cache[key] = result
                  return result

              def commit_info(self, sha):
                  key = f"commit_info:{sha}"
                  if key in self.cache:
                      return self.cache[key]
                  data, _ = gh_api_json(f"repos/{self.repo}/commits/{sha}")
                  author = (data or {}).get("author") or {}
                  msg = subprocess.run(
                      ["git", "-C", self.repo_dir, "log", "-1", "--pretty=format:%s", sha],
                      capture_output=True, text=True, check=True,
                  ).stdout.strip()
                  result = {
                      "title": msg,
                      "author": author.get("login"),
                      "url": f"https://github.com/{self.repo}/commit/{sha}",
                  }
                  self.cache[key] = result
                  return result

              def resolve_leaves(self, sha, seen, depth=0):
                  if sha in seen or depth > 12:
                      return []
                  seen.add(sha)
                  pr = self.pr_for_commit(sha)
                  if pr and PROMOTION_TITLE.match(pr["title"]):
                      leaves = []
                      for inner_sha in self.pr_commits(pr["number"]):
                          leaves.extend(self.resolve_leaves(inner_sha, seen, depth + 1))
                      return leaves
                  return [pr if pr else self.commit_info(sha)]


          def excluded(title):
              return any(p.search(title) for p in LEAF_EXCLUDE)


          def format_bullet(leaf):
              title, author, url = leaf["title"], leaf.get("author"), leaf.get("url")
              if author and url:
                  return f"- {title} by @{author} in {url}"
              if url:
                  return f"- {title} in {url}"
              return f"- {title}"


          def leaf_key(leaf):
              """Stable identity for a leaf: its PR number if known, else its title."""
              number = leaf.get("number")
              return f"#{number}" if number else leaf["title"]


          def collect_leaves(resolver, repo_dir, rng):
              log = subprocess.run(
                  ["git", "-C", repo_dir, "log", rng, "--pretty=format:%H", "--reverse"],
                  capture_output=True, text=True, check=True,
              ).stdout
              shas = [s for s in log.split("\n") if s.strip()]
              seen = set()
              leaves = []
              for sha in shas:
                  leaves.extend(resolver.resolve_leaves(sha, seen))
              return leaves


          def build_bullets(repo, repo_dir, prev, tag):
              resolver = Resolver(repo, repo_dir)
              rng = f"{prev}..{tag}" if prev else tag
              all_leaves = collect_leaves(resolver, repo_dir, rng)

              # A promotion PR's commit list (from the GitHub API) can reach commits from
              # before this release window — long-lived development/test branches and
              # branch-alignment resets both cause this — so the recursion may surface
              # PRs that already shipped in an earlier tag. The prev..tag git range only
              # bounds the top-level promotion commits, not the recursion, and squash
              # merges rule out SHA-ancestry filtering. Subtract everything reachable from
              # prev so an already-released PR never reappears in a later release.
              released = set()
              if prev:
                  released = {leaf_key(leaf) for leaf in collect_leaves(resolver, repo_dir, prev)}

              bullets, seen_keys = [], set()
              for leaf in reversed(all_leaves):  # newest first
                  key = leaf_key(leaf)
                  if key in released or key in seen_keys or excluded(leaf["title"]):
                      continue
                  seen_keys.add(key)
                  bullets.append(format_bullet(leaf))
              return bullets


          def main():
              ap = argparse.ArgumentParser()
              ap.add_argument("--repo", required=True, help="owner/name")
              ap.add_argument("--tag", required=True)
              ap.add_argument("--prev-tag", default=None)
              ap.add_argument("--repo-dir", default=".")
              args = ap.parse_args()

              bullets = build_bullets(args.repo, args.repo_dir, args.prev_tag, args.tag)
              parts = ["## What's Changed", ""]
              parts.extend(bullets)
              parts.append("")
              parts.append("## Full Changelog")
              parts.append("")
              if args.prev_tag:
                  parts.append(f"**Full Changelog**: https://github.com/{args.repo}/compare/{args.prev_tag}...{args.tag}")
              print("\n".join(parts))


          if __name__ == "__main__":
              main()
          PYEOF

          if [[ -n "$PREV_TAG" ]]; then
            python3 /tmp/changelog-notes.py --repo "$GH_REPO" --tag "$TAG" --prev-tag "$PREV_TAG" > /tmp/notes.md
          else
            python3 /tmp/changelog-notes.py --repo "$GH_REPO" --tag "$TAG" > /tmp/notes.md
          fi

          gh release edit "$TAG" --notes-file /tmp/notes.md

  update-helm:
    name: Update Helm
    runs-on: ubuntu-24.04
    needs: docker
    steps:
      - name: Create TAG env (sha-short)
        shell: bash
        run: |
          set -euo pipefail
          echo "TAG=sha-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.CI_GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: cloud

      - name: Checkout cloud repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/cloud
          token: ${{ steps.app-token.outputs.token }}
          path: cloud
          fetch-depth: 0

      - name: Install yq (pinned)
        shell: bash
        run: |
          set -euo pipefail
          arch="$(uname -m)"; case "$arch" in
            x86_64) yq_arch="amd64" ;;
            aarch64|arm64) yq_arch="arm64" ;;
            *) echo "Unsupported arch: $arch" >&2; exit 1 ;;
          esac
          curl -fsSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_${yq_arch}"
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Update Helm values image tag with yq
        shell: bash
        run: |
          set -euo pipefail
          chart_dir="./cloud/helm/lgtm"
          values_file="${chart_dir}/values.yaml"

          if [[ ! -f "$values_file" ]]; then
            echo "Helm values not found at $values_file" >&2
            exit 1
          fi

          yq eval --inplace '.ratatoskr.image.tag = strenv(TAG)' "$values_file"

          echo "Updated lgtm image tag in values.yaml to: ${TAG}"

      - name: Commit and push changes
        shell: bash
        working-directory: cloud
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/lgtm/values.yaml
          git diff --cached --quiet || git commit -m "chore(ci): sync lgtm Helm tag to ${TAG}"
          # Push to main only. cloud's sync-branches workflow fires on this push
          # and owns downstream realignment (reset test to main; reset/rebase
          # development). Realigning here would race that workflow and reintroduce
          # merge commits on development.
          git push
