# Generated by dx/scripts/release-sync from ci-templates/release-go.yaml.
# Do not edit directly — change the template and re-run release-sync.

name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.26"
  IMAGE: ghcr.io/${{ github.repository }}
  BINARY_NAME: ratatoskr
  YQ_VERSION: "v4.44.3"

jobs:
  build-binaries:
    name: Build Binary (${{ matrix.artifact }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: linux-amd64
          - goos: linux
            goarch: arm64
            artifact: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o dist/${{ env.BINARY_NAME }} \
            ./cmd/${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.artifact }}
          path: dist/${{ env.BINARY_NAME }}
          retention-days: 1

  docker:
    name: Build Docker Image
    runs-on: ubuntu-24.04
    needs: build-binaries
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.BINARY_NAME }}-linux-amd64
          path: binaries/linux/amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.BINARY_NAME }}-linux-arm64
          path: binaries/linux/arm64

      - name: Make binaries executable
        run: chmod +x binaries/linux/*/${{ env.BINARY_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ env.BINARY_NAME }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BINARY_NAME=${{ env.BINARY_NAME }}

      - name: Test image health
        run: |
          # Distroless has no shell; invoke the binary directly.
          docker run --rm ${{ env.IMAGE }}:sha-${GITHUB_SHA::7} --help

  goreleaser:
    name: GoReleaser
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-helm:
    name: Update Helm
    runs-on: ubuntu-24.04
    needs: docker
    steps:
      - name: Create TAG env (sha-short)
        shell: bash
        run: |
          set -euo pipefail
          echo "TAG=sha-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.CI_GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.CI_GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: cloud

      - name: Checkout cloud repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/cloud
          token: ${{ steps.app-token.outputs.token }}
          path: cloud
          fetch-depth: 0

      - name: Install yq (pinned)
        shell: bash
        run: |
          set -euo pipefail
          arch="$(uname -m)"; case "$arch" in
            x86_64) yq_arch="amd64" ;;
            aarch64|arm64) yq_arch="arm64" ;;
            *) echo "Unsupported arch: $arch" >&2; exit 1 ;;
          esac
          curl -fsSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_${yq_arch}"
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Update Helm values image tag with yq
        shell: bash
        run: |
          set -euo pipefail
          chart_dir="./cloud/helm/lgtm"
          values_file="${chart_dir}/values.yaml"

          if [[ ! -f "$values_file" ]]; then
            echo "Helm values not found at $values_file" >&2
            exit 1
          fi

          yq eval --inplace '.ratatoskr.image.tag = strenv(TAG)' "$values_file"

          echo "Updated lgtm image tag in values.yaml to: ${TAG}"

      - name: Commit and push changes
        shell: bash
        working-directory: cloud
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/lgtm/values.yaml
          git diff --cached --quiet || git commit -m "chore(ci): sync lgtm Helm tag to ${TAG}"
          # Push to main only. cloud's sync-branches workflow fires on this push
          # and owns downstream realignment (reset test to main; reset/rebase
          # development). Realigning here would race that workflow and reintroduce
          # merge commits on development.
          git push
