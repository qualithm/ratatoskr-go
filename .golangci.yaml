# golangci-lint v2 configuration
# https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gosec
    - misspell
    - unconvert
    - unparam
    - prealloc
    - bodyclose
    - errorlint
    - gocritic
    - nolintlint
  settings:
    revive:
      rules:
        - name: exported
          arguments: ["disableStutteringCheck"]
    gosec:
      excludes:
        - G104 # audited via errcheck
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: examples/
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/qualithm/ratatoskr-go

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
